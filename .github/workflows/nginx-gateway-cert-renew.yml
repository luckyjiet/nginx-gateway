name: nginx-gateway-cert-renew

on:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nginx-gateway-cert-renew
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Renew certificate on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -eu
            test -d "/opt/projects/nginx-gateway"
            cd "/opt/projects/nginx-gateway"
            test -x ./scripts/renew-cert.sh
            ./scripts/renew-cert.sh
